[phases.setup]
nixPkgs = ["nodejs_22", "python3"]

# Railway sets NPM_CONFIG_PRODUCTION, which triggers a deprecated npm warning on stderr.
# Unset it and install devDependencies (vite) for the build step.
[phases.install]
cmds = ["sh -c 'unset NPM_CONFIG_PRODUCTION; npm ci --include=dev'"]

[phases.build]
cmds = [
  "sh -c 'unset NPM_CONFIG_PRODUCTION; npm run build'",
  "npm prune --omit=dev",
]

[start]
cmd = "npm start"
